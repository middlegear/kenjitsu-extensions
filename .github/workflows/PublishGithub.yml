name: Publish to GitHub Packages

on:
  workflow_dispatch: 

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Configure GitHub Packages Auth
        run: |
          rm -f ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Install dependencies
        run: |
          pnpm config set registry https://registry.npmjs.org/
          pnpm install --prod
          pnpm add -D tsup typescript

      - name: Generate unique version
        id: version_generator
        run: |
          
          VERSION_DATE=$(date +%Y.%m.%d)
          VERSION_TIME=$(date +%H%M)
          echo "NEW_VERSION=${VERSION_DATE}-${VERSION_TIME}" >> $GITHUB_ENV

      - name: Update package.json with the new version
        run: |
          jq '.version = env.NEW_VERSION' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Build package
        run: pnpm build

      - name: Prepare GitHub Package name
        run: |
          jq '.name = "@${{ github.repository_owner }}/kenjitsu-extensions"' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Publish to GitHub Packages
        run: |
          pnpm config set @${{ github.repository_owner }}:registry=https://npm.pkg.github.com
          pnpm publish \
            --registry=https://npm.pkg.github.com \
            --no-git-checks \
            --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
