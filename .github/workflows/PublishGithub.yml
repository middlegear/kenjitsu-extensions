name: Publish to GitHub Packages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          pnpm config set registry https://registry.npmjs.org/
          pnpm install

      - name: Build package
        run: pnpm build

      - name: Publish to GitHub Packages (with forced scope)
        run: |
          # Temporarily rename package to scoped version for publishing
          echo "Publishing under @middlegear scope"
          pnpm publish \
            --registry=https://npm.pkg.github.com \
            --no-git-checks \
            --tag github-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
