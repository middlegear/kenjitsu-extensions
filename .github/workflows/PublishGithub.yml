name: Publish to GitHub Packages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies (from npm)
        run: |
          # Use default npm registry for installation
          pnpm config set registry https://registry.npmjs.org/
          pnpm install

      - name: Build package
        run: pnpm build

      - name: Configure GitHub Packages for publishing only
        run: |
          # Only configure GitHub Packages auth without changing default registry
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Publish to GitHub Packages
        run: |
          # Temporary override just for publishing
          pnpm publish --registry=https://npm.pkg.github.com --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}