name: Publish to GitHub Packages (Development)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Configure GitHub Packages Auth
        run: |
          rm -f ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Install dependencies
        run: |
          pnpm config set registry https://registry.npmjs.org/
          pnpm install

      - name: Build package
        run: pnpm build

      - name: Prepare GitHub Package name
        run: |
          # Scope the package for GitHub Packages
          jq '.name = "@${{ github.repository_owner }}/hakai-extensions"' package.json > package.tmp.json
          mv package.tmp.json package.json
          # Set publishConfig registry to GitHub Packages
          jq '.publishConfig.registry = "https://npm.pkg.github.com/"' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Semantic Release (Development)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
