name: Publish to GitHub Packages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Configure GitHub Packages Auth
        run: |
          # Clear any existing npmrc
          rm -f ~/.npmrc
          # Set auth specifically for GitHub Packages
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Install dependencies
        run: |
          pnpm config set registry https://registry.npmjs.org/
          pnpm install

      - name: Build package
        run: pnpm build

      - name: Force publish unscoped package
        run: |
          # Temporary override for unscoped package
          pnpm config set @middlegear:registry=https://npm.pkg.github.com
          pnpm publish \
            --registry=https://npm.pkg.github.com \
            --no-git-checks \
            --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
