<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="seasons-list seasons-list-new border-bottom-block">
        <div class="detail_page-servers mb-0">
            <div class="dp-s-line" id="servers-list"></div>
        </div>
        <div class="sl-content">
            <div class="slc-eps">
                <div class="sl-title">
                    <div class="slt-seasons-dropdown">
                        <button class="btn btn-seasons dropdown-toggle" type="button" data-toggle="dropdown"><i
                                class="fas fa-list mr-2"></i><span id="current-season"></span>
                        </button>
                        <div class="dropdown-menu dropdown-menu-new">

                            <a data-id="25165" id="ss-25165" data-toggle="tab" class="dropdown-item ss-item"
                                href="#ss-episodes-25165">Season 1</a>

                            <a data-id="60861" id="ss-60861" data-toggle="tab" class="dropdown-item ss-item"
                                href="#ss-episodes-60861">Season 2</a>

                            <a data-id="68632" id="ss-68632" data-toggle="tab" class="dropdown-item ss-item"
                                href="#ss-episodes-68632">Season 3</a>

                            <a data-id="83365" id="ss-83365" data-toggle="tab" class="dropdown-item ss-item"
                                href="#ss-episodes-83365">Season 4</a>

                        </div>
                    </div>
                </div>
                <div class="clearfix"></div>
                <div class="slce-list">
                    <div class="tab-content">

                        <div class="ss-episodes tab-pane fade" id="ss-episodes-25165"></div>

                        <div class="ss-episodes tab-pane fade" id="ss-episodes-60861"></div>

                        <div class="ss-episodes tab-pane fade" id="ss-episodes-68632"></div>

                        <div class="ss-episodes tab-pane fade" id="ss-episodes-83365"></div>

                    </div>
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="clearfix"></div>
        </div>
    </div>
    <script>
        $('.ss-item').click(function () {
            $("#servers-list").empty();
            $('.ss-item').removeClass('active');
            $('.ss-episodes').removeClass('active show');
            $(this).addClass('active');
            $('#current-season').text($(this).text());

            var ssID = $(this).attr('data-id');
            $('#ss-episodes-' + ssID).addClass('active show');

            if ($('#ss-episodes-' + ssID).is(':empty')) {
                $.get("/ajax/season/episodes/" + ssID, function (res) {
                    $('#ss-episodes-' + ssID).html(res);
                    chooseEpisode(ssID);
                });
            } else {
                chooseEpisode(ssID);
            }
        });

        function chooseEpisode(ssID) {
            var currentEpsID = $('.detail_page-watch').attr('data-episode');
            if ($('#episode-' + currentEpsID).length > 0) {
                $('#episode-' + currentEpsID).click();
                $('.detail_page-watch').attr('data-episode', '');
            } else {
                if ($('.detail_page').hasClass('watch_page')) {
                    $('#ss-episodes-' + ssID + ' .eps-item').first().click();
                }
            }
        }

        var ssID = $('.detail_page-watch').attr('data-season');
        if (ssID) {
            $('#ss-' + ssID).click();
            $('#ss-episodes-' + ssID).addClass('active show');
        } else {
            $('.ss-item').first().click();
            $('.ss-episodes').first().addClass('active show');
        }
    </script>
</body>

</html>
